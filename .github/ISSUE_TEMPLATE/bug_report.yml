name: Bug report
description: Report a problem with Teebot Flow
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: "Example: Delivery challan creation fails for archived customers"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. Open the app
      description: List the steps needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, version, build channel, etc.
